name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write  # needed by publish_screenshots_to_release for gh release upload

jobs:
  # =====================================================================
  # 1. Mocked unit tests across the full OS x Python matrix.
  # =====================================================================
  unit_tests_mocked_across_full_matrix:
    name: Unit tests (mocked) — ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip pytest
      - run: pytest -v tests/test_detection.py tests/test_command_construction.py tests/test_cli.py

  # =====================================================================
  # 2. tmux real spawn — captures pane text rendered to PNG via Pillow.
  # =====================================================================
  real_spawn_tmux_on_linux:
    name: Real spawn — tmux (Linux)
    runs-on: ubuntu-latest
    needs: unit_tests_mocked_across_full_matrix
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install tmux and Pillow
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux fonts-dejavu
          python3 -m pip install Pillow
      - name: Spawn into tmux pane and verify sentinel + capture pane image
        run: |
          SENTINEL="$RUNNER_TEMP/sentinel_tmux.txt"
          SHOT="$RUNNER_TEMP/screenshot_tmux.png"
          tmux new-session -d -s otr_session -x 200 -y 50 \
            "python3 tests/verify_real_spawn_writes_sentinel_file.py \
              --expected-mechanism tmux \
              --sentinel $SENTINEL \
              --timeout 30 \
              --hold-seconds 20 \
              --screenshot-output-path $SHOT \
              --screenshot-delay-seconds 4 ; \
             echo \$? > $RUNNER_TEMP/harness_exit.txt"
          for i in $(seq 1 90); do
            [ -f "$RUNNER_TEMP/harness_exit.txt" ] && break
            sleep 1
          done
          tmux capture-pane -t otr_session -p || true
          EXIT_CODE=$(cat "$RUNNER_TEMP/harness_exit.txt" 2>/dev/null || echo 99)
          echo "Harness exit code: $EXIT_CODE"
          ls -la "$RUNNER_TEMP/" || true
          exit "$EXIT_CODE"
      - name: Upload tmux screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot_tmux
          path: ${{ runner.temp }}/screenshot_tmux.png
          if-no-files-found: warn

  # =====================================================================
  # 3. Linux desktop terminal emulators with screenshots.
  # =====================================================================
  real_spawn_linux_terminal_emulator:
    name: Real spawn — Linux ${{ matrix.terminal }}
    runs-on: ubuntu-latest
    needs: unit_tests_mocked_across_full_matrix
    strategy:
      fail-fast: false
      matrix:
        include:
          - terminal: xterm
            apt_package: xterm
            expected_mechanism: xterm
          - terminal: gnome-terminal
            apt_package: gnome-terminal dbus-x11
            expected_mechanism: gnome-terminal
          - terminal: konsole
            apt_package: konsole
            expected_mechanism: konsole
          - terminal: xfce4-terminal
            apt_package: xfce4-terminal
            expected_mechanism: xfce4-terminal
          - terminal: alacritty
            apt_package: alacritty libgl1-mesa-dri mesa-utils
            expected_mechanism: alacritty
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install terminal + xvfb + ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb imagemagick ${{ matrix.apt_package }}
      - name: Allow ImageMagick to read X11 (default policy blocks some ops)
        run: |
          sudo sed -i 's/rights="none" pattern="X11"/rights="read|write" pattern="X11"/' /etc/ImageMagick-6/policy.xml || true
      - name: Confirm only the target terminal is detectable
        run: |
          for t in gnome-terminal konsole xfce4-terminal alacritty xterm; do
            if command -v "$t" >/dev/null; then echo "FOUND: $t"; else echo "missing: $t"; fi
          done
      - name: Spawn ${{ matrix.terminal }} under xvfb, verify sentinel, capture screenshot
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
        run: |
          SENTINEL="$RUNNER_TEMP/sentinel_${{ matrix.terminal }}.txt"
          SHOT="$RUNNER_TEMP/screenshot_${{ matrix.terminal }}.png"
          XVFB_RES="-screen 0 1280x800x24"
          if [ "${{ matrix.terminal }}" = "gnome-terminal" ]; then
            xvfb-run -a -s "$XVFB_RES" dbus-launch --exit-with-session \
              python3 tests/verify_real_spawn_writes_sentinel_file.py \
                --expected-mechanism "${{ matrix.expected_mechanism }}" \
                --sentinel "$SENTINEL" \
                --timeout 60 \
                --hold-seconds 20 \
                --screenshot-output-path "$SHOT" \
                --screenshot-delay-seconds 4
          else
            xvfb-run -a -s "$XVFB_RES" \
              python3 tests/verify_real_spawn_writes_sentinel_file.py \
                --expected-mechanism "${{ matrix.expected_mechanism }}" \
                --sentinel "$SENTINEL" \
                --timeout 60 \
                --hold-seconds 20 \
                --screenshot-output-path "$SHOT" \
                --screenshot-delay-seconds 4
          fi
      - name: Upload ${{ matrix.terminal }} screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot_${{ matrix.terminal }}
          path: ${{ runner.temp }}/screenshot_${{ matrix.terminal }}.png
          if-no-files-found: warn

  # NOTE: a macOS Terminal.app real-spawn job was intentionally NOT
  # included. Verified empirically and via research that GitHub-hosted
  # macOS runners cannot launch Terminal.app from a workflow:
  #   - osascript→Terminal AppleEvent is TCC-blocked, no UI to approve
  #   - `open -a Terminal file.command` needs a logged-in Aqua session
  #     which hosted runners don't provide (runner runs as a background
  #     service, not from a console login)
  #   - TCC.db is SIP-protected; pre-approval is not possible on
  #     GitHub-hosted runners
  # See: actions/runner-images #553, #7531; aahlenst.dev "Accessing the
  # macOS GUI in Automation Contexts". macOS source code is still
  # exercised by the mocked unit tests on macos-latest above; the macOS
  # branch is documented in the README as supported-but-untested.

# =====================================================================
  # 5. Windows Terminal (wt.exe) — desktop screenshot via PowerShell.
  # =====================================================================
  real_spawn_windows_terminal_wt_exe:
    name: Real spawn — Windows Terminal (wt.exe)
    runs-on: windows-latest
    needs: unit_tests_mocked_across_full_matrix
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Spawn and capture screenshot
        shell: pwsh
        run: |
          $sentinel = Join-Path $env:RUNNER_TEMP "sentinel_wt.txt"
          $shot = Join-Path $env:RUNNER_TEMP "screenshot_windows_terminal.png"
          python tests/verify_real_spawn_writes_sentinel_file.py `
            --expected-mechanism "Windows Terminal" `
            --sentinel "$sentinel" `
            --timeout 60 `
            --hold-seconds 20 `
            --screenshot-output-path "$shot" `
            --screenshot-delay-seconds 4
      - name: Upload Windows Terminal screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot_windows_terminal
          path: ${{ runner.temp }}/screenshot_windows_terminal.png
          if-no-files-found: warn

  # =====================================================================
  # 6. Windows cmd.exe — desktop screenshot via PowerShell.
  # =====================================================================
  real_spawn_windows_cmd_exe:
    name: Real spawn — Windows cmd.exe (wt.exe hidden)
    runs-on: windows-latest
    needs: unit_tests_mocked_across_full_matrix
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Spawn cmd.exe and capture screenshot
        shell: pwsh
        run: |
          $sentinel = Join-Path $env:RUNNER_TEMP "sentinel_cmd.txt"
          $shot = Join-Path $env:RUNNER_TEMP "screenshot_windows_cmd.png"
          python tests/verify_real_spawn_writes_sentinel_file.py `
            --expected-mechanism "cmd.exe" `
            --sentinel "$sentinel" `
            --hide-wt `
            --timeout 60 `
            --hold-seconds 20 `
            --screenshot-output-path "$shot" `
            --screenshot-delay-seconds 4
      - name: Upload Windows cmd.exe screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot_windows_cmd
          path: ${{ runner.temp }}/screenshot_windows_cmd.png
          if-no-files-found: warn

  # =====================================================================
  # 7. Aggregator — download all screenshot artifacts and (over)write
  # them to the v0.1.0 GitHub Release. Only runs on push to main, after
  # the real-spawn jobs have produced artifacts.
  # =====================================================================
  publish_screenshots_to_release:
    name: Publish screenshots to v0.1.0 release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - real_spawn_tmux_on_linux
      - real_spawn_linux_terminal_emulator
      - real_spawn_windows_terminal_wt_exe
      - real_spawn_windows_cmd_exe
      # macOS best-effort intentionally not required — continue-on-error.
    steps:
      - uses: actions/checkout@v4
      - name: Download all screenshot artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: screenshot_*
          path: ${{ runner.temp }}/all_screenshots
          merge-multiple: true
      - name: List collected screenshots
        run: ls -la "$RUNNER_TEMP/all_screenshots/" || true
      - name: Ensure v0.1.0 release exists, then upload screenshots
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v0.1.0 missing; creating tag and release on $GITHUB_SHA"
            gh release create v0.1.0 \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "v0.1.0" \
              --notes "Initial release. Screenshots below are auto-updated by CI on every push to main, demonstrating real terminal-window spawning across all supported mechanisms."
          fi
          shopt -s nullglob
          shot_files=("$RUNNER_TEMP/all_screenshots/"*.png)
          if [ "${#shot_files[@]}" -eq 0 ]; then
            echo "No screenshot files found; nothing to upload."
            exit 0
          fi
          gh release upload v0.1.0 "${shot_files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
